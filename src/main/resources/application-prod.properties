spring.application.name=Veterinaria

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# DDL deshabilitado en producción para evitar conexiones extra al inicio (límite de Supabase free tier).
# Las tablas ya existen en Supabase. Si agregas, renombras o modificas entidades JPA (@Entity),
# debes aplicar los cambios manualmente:
#   OPCIÓN A (recomendada): ejecuta el SQL directamente en Supabase > SQL Editor.
#   OPCIÓN B (temporal): cambia este valor a 'update', corre la app localmente apuntando a Supabase
#                        para que Hibernate aplique los cambios, y luego vuelve a 'none' antes de hacer push.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Desactivar Open Session in View — libera conexiones DB más rápido
spring.jpa.open-in-view=false

# Hibernate batch para agrupar inserts/updates
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Limitar el pool de conexiones para respetar el límite del tier gratuito de Supabase (15 total).
# Si contratas un plan de pago puedes subir estos valores.
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=20000

# Compresión GZIP de respuestas HTTP
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.compression.min-response-size=1024

server.port=${PORT:8080}

logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
